<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ElderCare AI - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            color: white;
            max-width: 800px;
            padding: 40px;
        }

        .logo {
            font-size: 56px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 15px;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 18px;
            margin-bottom: 50px;
            opacity: 0.95;
        }

        .choice-text {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 40px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .buttons-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 50px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 20px;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .login-card:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .icon {
            font-size: 64px;
        }

        .card-title {
            font-size: 28px;
            font-weight: 700;
        }

        .card-description {
            font-size: 14px;
            opacity: 0.9;
            line-height: 1.5;
        }

        .btn {
            background: white;
            color: #667eea;
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-weight: 700;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
            margin-top: 15px;
        }

        .login-card:hover .btn {
            background: #f0f0f0;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 25px;
            border-radius: 15px;
            font-size: 14px;
            line-height: 1.8;
        }

        .info-box h3 {
            margin-bottom: 15px;
            font-size: 16px;
        }

        .info-box p {
            margin: 8px 0;
        }

        .feature-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        .feature {
            text-align: left;
            font-size: 13px;
        }

        @media (max-width: 768px) {
            .buttons-container {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 32px;
            }

            .choice-text {
                font-size: 18px;
            }

            .container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">🤖</div>
    <h1>ElderCare AI</h1>
    <div class="subtitle">Smart Medication Monitoring for Elderly Patients</div>
    
    <div class="choice-text">Who are you?</div>

    <div class="buttons-container">
        <!-- ADMIN LOGIN -->
        <a href="/admin_login" class="login-card">
            <div class="icon">👔</div>
            <div class="card-title">Admin</div>
            <div class="card-description">Healthcare Provider or Caregiver</div>
            <button class="btn">Login as Admin</button>
        </a>

        <!-- USER LOGIN -->
        <a href="/user_login" class="login-card">
            <div class="icon">👤</div>
            <div class="card-title">Patient</div>
            <div class="card-description">Elderly Patient or Family Member</div>
            <button class="btn">Login as Patient</button>
        </a>
    </div>

    <!-- INFO SECTION -->
    <div class="info-box">
        <h3>Demo Credentials</h3>
        <p><strong style="color: #ff7e5f;">👔 Admin Account:</strong></p>
        <p style="margin-left: 20px; margin-bottom: 15px;">
            Username: <code style="background: rgba(0,0,0,0.2); padding: 2px 5px; border-radius: 4px;">admin</code><br>
            Password: <code style="background: rgba(0,0,0,0.2); padding: 2px 5px; border-radius: 4px;">admin</code>
        </p>

        <p><strong style="color: #4fc3f7;">👤 Patient Account:</strong></p>
        <p style="margin-left: 20px;">
            Username: <code style="background: rgba(0,0,0,0.2); padding: 2px 5px; border-radius: 4px;">Dhanashree</code><br>
            Password: <code style="background: rgba(0,0,0,0.2); padding: 2px 5px; border-radius: 4px;">1234</code>
        </p>
    </div>
</div>

</body>
</html>
