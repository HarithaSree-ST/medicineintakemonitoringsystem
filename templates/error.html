<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Error | ElderCare AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(to right, #eef2f3, #d9e4f5);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .error-container {
            background: white;
            padding: 50px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            max-width: 500px;
        }

        .error-container h1 {
            color: #e74c3c;
            margin-bottom: 20px;
            font-size: 36px;
        }

        .error-container p {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
        }

        .btn {
            background: #4fc3f7;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            text-decoration: none;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #039be5;
        }
    </style>
</head>
<body>

    <div class="error-container">
        <h1>❌ Error</h1>
        <p>{{ message }}</p>
        <a href="/login"><button class="btn">Go to Login</button></a>
    </div>

</body>
</html>
