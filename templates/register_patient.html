{% extends "base.html" %}
{% block content %}

<style>
    .register-container {
        width: 90%;
        max-width: 600px;
        margin: 60px auto;
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    }

    .register-container h1 {
        text-align: center;
        margin-bottom: 30px;
        color: #1f2d3d;
    }

    .form-group {
        margin-bottom: 18px;
    }

    label {
        font-weight: bold;
        display: block;
        margin-bottom: 6px;
        color: #555;
    }

    input, select {
        width: 100%;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-size: 14px;
        transition: 0.3s;
    }

    input:focus, select:focus {
        border-color: #4fc3f7;
        outline: none;
        box-shadow: 0 0 5px rgba(79, 195, 247, 0.5);
    }

    .btn {
        width: 100%;
        padding: 12px;
        background-color: #4fc3f7;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn:hover {
        background-color: #039be5;
    }
</style>

<div class="register-container">
    <h1>➕ Register New Patient</h1>

    <form method="POST">

        <div class="form-group">
            <label>Patient Name</label>
            <input type="text" name="name" required>
        </div>

        <div class="form-group">
            <label>Age</label>
            <input type="number" name="age" required>
        </div>

        <div class="form-group">
            <label>Gender</label>
            <select name="gender" required>
                <option value="">Select Gender</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select>
        </div>

        <div class="form-group">
            <label>Language</label>
            <select name="language">
                <option value="english">English</option>
                <option value="hindi">Hindi</option>
            </select>
        </div>

        <div class="form-group">
            <label>Doctor Name</label>
            <input type="text" name="doctor" required>
        </div>
        <div class="form-group">
           <label>Phone Number</label>
           <input type="text" name="phone" required>
        </div>
        <div class="form-group">
           <label>Caretaker Phone:</label>
<input type="text" name="caretaker_phone" required>
        </div>
        
        <button type="submit" class="btn">Register Patient</button>

    </form>
</div>

{% endblock %}
